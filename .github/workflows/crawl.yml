name: 每日爬取3DGS论文数据

on:
  schedule:
    - cron: '0 2 * * *'   # 每天北京时间 10:00 (UTC 2:00)
  workflow_dispatch:        # 支持手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: pip install requests

      - name: 爬取论文数据
        run: python3 scripts/crawl.py

      - name: 提交数据更新
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/papers.json
          git diff --staged --quiet || git commit -m "chore: 自动更新论文数据 $(date '+%Y-%m-%d')"
          git push
