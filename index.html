<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DGS Papers Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7fa;color:#333}
header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;padding:2rem;text-align:center}
header h1{font-size:2rem;margin-bottom:.5rem}
header p{opacity:.8;font-size:.9rem}
.tabs{display:flex;justify-content:center;gap:1rem;padding:1.2rem;background:white;border-bottom:1px solid #e0e0e0;position:sticky;top:0;z-index:10;flex-wrap:wrap}
.tab{padding:.6rem 1.5rem;border-radius:2rem;cursor:pointer;border:2px solid #1a1a2e;background:white;font-weight:600;transition:all .2s;font-size:.9rem}
.tab.active,.tab:hover{background:#1a1a2e;color:white}
.filter-bar{max-width:960px;margin:1.5rem auto .5rem;padding:0 1rem;display:flex;gap:.8rem;flex-wrap:wrap;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:.75rem;color:#888;text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg select{padding:.45rem .7rem;border:1px solid #ddd;border-radius:8px;font-size:.85rem;background:white;outline:none}
.fg input:focus,.fg select:focus{border-color:#1a1a2e}
.fg.grow{flex:1;min-width:180px}
.result-info{max-width:960px;margin:.5rem auto;padding:0 1rem;font-size:.8rem;color:#999}
.section{display:none;max-width:960px;margin:1rem auto 3rem;padding:0 1rem}
.section.active{display:block}
.card{background:white;border-radius:12px;padding:1.2rem 1.5rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
.card-header{display:flex;justify-content:space-between;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.5rem}
.badge{font-size:.8rem;padding:.2rem .7rem;border-radius:1rem;font-weight:600}
.badge.cite{background:#fff3e0;color:#e65100}
.badge.cite.high{background:#e8f5e9;color:#2e7d32}
.badge.date{background:#e3f2fd;color:#1565c0}
.arxiv-link{font-size:.85rem;color:#1565c0;text-decoration:none;font-weight:600}
.arxiv-link:hover{text-decoration:underline}
.card h3{font-size:1rem;line-height:1.5;margin-bottom:.4rem}
.authors{font-size:.85rem;color:#666;margin-bottom:.5rem}
.abstract{font-size:.85rem;color:#555;line-height:1.6;border-top:1px solid #f0f0f0;padding-top:.5rem;margin-top:.5rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.pagination{display:flex;justify-content:center;gap:.4rem;flex-wrap:wrap;margin-top:1.5rem}
.page-btn{padding:.45rem .9rem;border:1px solid #ddd;border-radius:6px;background:white;cursor:pointer;font-size:.85rem;transition:all .2s}
.page-btn:hover,.page-btn.active{background:#1a1a2e;color:white;border-color:#1a1a2e}
.author-layout{display:flex;gap:1.5rem}
.author-list{width:220px;flex-shrink:0;background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);align-self:flex-start;position:sticky;top:72px;max-height:80vh;overflow-y:auto}
.author-list ul{list-style:none}
.author-item{display:flex;justify-content:space-between;align-items:center;padding:.7rem 1rem;cursor:pointer;border-bottom:1px solid #f0f0f0;transition:background .15s}
.author-item:hover,.author-item.active{background:#e8eaf6}
.author-name{font-size:.85rem;font-weight:500}
.author-count{font-size:.75rem;background:#1a1a2e;color:white;border-radius:1rem;padding:.1rem .5rem}
.author-panels{flex:1;min-width:0}
.author-panel{display:none}
.author-panel.active{display:block}
.center-msg{text-align:center;padding:4rem;color:#999;font-size:.95rem}
footer{text-align:center;padding:2rem;color:#aaa;font-size:.8rem}
@media(max-width:700px){
  .author-layout{flex-direction:column}
  .author-list{position:static;width:100%;max-height:none}
  .filter-bar{flex-direction:column}
}
</style>
</head>
<body>
<header>
  <h1>🔬 3DGS Papers Tracker</h1>
  <p id="header-sub">3D Gaussian Splatting 论文追踪 · 每日自动更新</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('high',this)">高引用 (≥10)</button>
  <button class="tab" onclick="showTab('latest',this)">最新论文</button>
  <button class="tab" onclick="showTab('authors',this)">Top Authors</button>
</div>

<div class="filter-bar" id="filter-bar">
  <div class="fg grow">
    <label>搜索</label>
    <input type="text" id="q" placeholder="标题、作者..." autocomplete="off" oninput="applyFilter()">
  </div>
  <div class="fg">
    <label>最低引用</label>
    <select id="min-cite" onchange="applyFilter()">
      <option value="0">全部</option>
      <option value="10">≥ 10</option>
      <option value="50">≥ 50</option>
      <option value="100">≥ 100</option>
      <option value="200">≥ 200</option>
    </select>
  </div>
  <div class="fg">
    <label>年份</label>
    <select id="year" onchange="applyFilter()">
      <option value="">全部</option>
      <option value="2026">2026</option>
      <option value="2025">2025</option>
      <option value="2024">2024</option>
      <option value="2023">2023</option>
    </select>
  </div>
</div>
<div class="result-info" id="result-info"></div>

<div id="high" class="section active"></div>
<div id="latest" class="section"></div>
<div id="authors" class="section">
  <div class="author-layout">
    <div class="author-list"><ul id="author-list-ul"></ul></div>
    <div class="author-panels" id="author-panels"></div>
  </div>
</div>

<footer id="footer">数据加载中...</footer>

<script>
let allPapers = [], currentTab = 'high', currentPage = {high:1, latest:1};
const PER = 20;
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

async function loadData() {
  try {
    const res = await fetch('data/papers.json?t=' + Date.now());
    if (!res.ok) throw new Error('数据文件不存在，请等待 GitHub Actions 首次运行');
    const data = await res.json();
    allPapers = data.papers || [];
    document.getElementById('header-sub').textContent =
      `3D Gaussian Splatting 论文追踪 · 更新于 ${data.updated_at||'未知'} · 共 ${allPapers.length} 篇`;
    document.getElementById('footer').textContent =
      `数据来源：arXiv + Semantic Scholar · 更新于 ${data.updated_at||'未知'}`;
    applyFilter();
    buildAuthors();
  } catch(e) {
    document.getElementById('high').innerHTML = `<div class="center-msg">⚠️ ${e.message}</div>`;
  }
}

function getFiltered(papers) {
  const q = document.getElementById('q').value.trim().toLowerCase();
  const minCite = parseInt(document.getElementById('min-cite').value) || 0;
  const year = document.getElementById('year').value;
  return papers.filter(p => {
    if (minCite && p.citations < minCite) return false;
    if (year && !String(p.published||'').startsWith(year)) return false;
    if (q && !p.title.toLowerCase().includes(q) && !(p.authors||'').toLowerCase().includes(q)) return false;
    return true;
  });
}

function applyFilter() {
  if (currentTab === 'authors') return;
  const high = getFiltered(allPapers.filter(p => p.citations >= 10));
  const latest = getFiltered([...allPapers].sort((a,b) => (b.published||'') > (a.published||'') ? 1 : -1));
  if (currentTab === 'high') renderCards('high', high, currentPage.high);
  if (currentTab === 'latest') renderCards('latest', latest, currentPage.latest);
  document.getElementById('result-info').textContent =
    currentTab === 'high' ? `共 ${high.length} 篇` : `共 ${latest.length} 篇`;
}

function renderCards(id, papers, page) {
  const el = document.getElementById(id);
  if (!papers.length) { el.innerHTML = '<div class="center-msg">没有符合条件的论文</div>'; return; }
  const start = (page-1)*PER, slice = papers.slice(start, start+PER);
  el.innerHTML = slice.map(p => `
    <div class="card">
      <div class="card-header">
        <span class="badge cite ${p.citations>=100?'high':''}">${p.citations} 引用</span>
        <span class="badge date">${p.published||p.year||''}</span>
        ${p.arxiv_url?`<a href="${p.arxiv_url}" target="_blank" class="arxiv-link">arXiv →</a>`:''}
      </div>
      <h3>${esc(p.title)}</h3>
      <p class="authors">${esc(p.authors||'')}</p>
      ${p.abstract?`<p class="abstract">${esc(p.abstract)}</p>`:''}
    </div>`).join('') + renderPagination(papers.length, page, id);
}

function renderPagination(total, page, tabId) {
  const pages = Math.ceil(total/PER);
  if (pages <= 1) return '';
  const s = Math.max(1,page-3), e = Math.min(pages,page+3);
  let html = '<div class="pagination">';
  if (page>1) html += `<button class="page-btn" onclick="goPage('${tabId}',${page-1})">‹</button>`;
  for (let i=s;i<=e;i++) html += `<button class="page-btn ${i===page?'active':''}" onclick="goPage('${tabId}',${i})">${i}</button>`;
  if (page<pages) html += `<button class="page-btn" onclick="goPage('${tabId}',${page+1})">›</button>`;
  return html + '</div>';
}

function goPage(tabId, p) {
  currentPage[tabId] = p;
  applyFilter();
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildAuthors() {
  const map = {};
  allPapers.forEach(p => {
    (p.authors||'').split(';').forEach(a => {
      const name = a.replace('et al.','').trim();
      if (!name) return;
      if (!map[name]) map[name] = [];
      map[name].push(p);
    });
  });
  const sorted = Object.entries(map).filter(([,v])=>v.length>=2)
    .sort((a,b)=>b[1].length-a[1].length).slice(0,30);

  document.getElementById('author-list-ul').innerHTML = sorted.map(([name,papers],i) =>
    `<li class="author-item ${i===0?'active':''}" onclick="selectAuthor(this,'ap-${i}')">
      <span class="author-name">${esc(name)}</span>
      <span class="author-count">${papers.length}</span>
    </li>`).join('');

  document.getElementById('author-panels').innerHTML = sorted.map(([name,papers],i) =>
    `<div class="author-panel ${i===0?'active':''}" id="ap-${i}">
      <h3 style="margin-bottom:1rem">${esc(name)}</h3>
      ${papers.sort((a,b)=>b.citations-a.citations).map(p=>`
        <div class="card">
          <div class="card-header">
            <span class="badge cite ${p.citations>=100?'high':''}">${p.citations} 引用</span>
            <span class="badge date">${p.published||''}</span>
            ${p.arxiv_url?`<a href="${p.arxiv_url}" target="_blank" class="arxiv-link">arXiv →</a>`:''}
          </div>
          <h3>${esc(p.title)}</h3>
          <p class="authors">${esc(p.authors||'')}</p>
        </div>`).join('')}
    </div>`).join('');
}

function selectAuthor(el, panelId) {
  document.querySelectorAll('.author-item').forEach(i=>i.classList.remove('active'));
  document.querySelectorAll('.author-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(panelId).classList.add('active');
}

function showTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  const show = tab !== 'authors';
  document.getElementById('filter-bar').style.display = show ? '' : 'none';
  document.getElementById('result-info').style.display = show ? '' : 'none';
  if (show) applyFilter();
}

loadData();
</script>
</body>
</html>
